name: "build: docker (traditional)"
on: push

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Record build start
        run: echo "BUILD_START=$(date +%s%N)" >> $GITHUB_ENV

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:docker-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report build duration
        run: |
          END=$(date +%s%N)
          echo "::notice::docker build+push took $(( (END - BUILD_START) / 1000000 ))ms"
