name: "build: crane (fast)"
on: push

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: alfredtm/yeet-cache-action@v1
        id: cache
        with:
          paths: cmd internal go.mod go.sum
          image: ${{ env.IMAGE }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          tags: crane-${{ steps.vars.outputs.short_sha }},latest

      - name: "Slow path: setup Go"
        if: steps.cache.outputs.hit == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: "Slow path: cross-compile (amd64)"
        if: steps.cache.outputs.hit == 'false'
        run: |
          START=$(date +%s%N)
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -trimpath -o app ./cmd/server
          END=$(date +%s%N)
          echo "::notice::go build took $(( (END - START) / 1000000 ))ms"
          ls -la app

      - name: "Slow path: crane append + mutate + tag"
        if: steps.cache.outputs.hit == 'false'
        run: |
          START=$(date +%s%N)

          mkdir -p _image/app
          cp app _image/app/server
          tar -cf layer.tar -C _image .

          # Build the image and tag it with src-<hash> so the next run hits the cache.
          crane append \
            --base gcr.io/distroless/static:nonroot \
            --new_layer layer.tar \
            --new_tag "${{ steps.cache.outputs.src-tag }}"

          crane mutate "${{ steps.cache.outputs.src-tag }}" --entrypoint /app/server

          crane tag "${{ steps.cache.outputs.src-tag }}" "crane-${{ steps.vars.outputs.short_sha }}"
          crane tag "${{ steps.cache.outputs.src-tag }}" latest

          END=$(date +%s%N)
          echo "::notice::crane append+mutate+tag took $(( (END - START) / 1000000 ))ms"
