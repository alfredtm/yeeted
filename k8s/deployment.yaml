apiVersion: apps/v1
kind: Deployment
metadata:
  name: yeeted
spec:
  replicas: 2
  selector:
    matchLabels:
      app: yeeted
  template:
    metadata:
      labels:
        app: yeeted
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: api
          image: ghcr.io/alfredtm/yeeted:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
