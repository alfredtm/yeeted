name: "build: crane (fast)"
on: push

env:
  IMAGE: ghcr.io/${{ github.repository }}
  GO_VERSION: "1.25"
  LDFLAGS: "-s -w"
  # Distroless base pinned by digest. Bump to roll the cache + pick up upstream updates.
  BASE_IMAGE: "gcr.io/distroless/static@sha256:963fa6c544fe5ce420f1f54fb88b6fb01479f054c8056d0f74cc2c6000df5240"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Compute source hash via GitHub API
        id: hash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          START=$(date +%s%N)
          TREE=$(gh api "repos/${GITHUB_REPOSITORY}/git/commits/${GITHUB_SHA}" -q '.tree.sha')
          JSON=$(gh api "repos/${GITHUB_REPOSITORY}/git/trees/${TREE}")
          HASHES_INPUT=""
          for p in cmd internal go.mod go.sum; do
            SHA=$(echo "$JSON" | jq -r ".tree[] | select(.path == \"$p\") | .sha")
            if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
              echo "::error::could not find path '$p' in tree ${TREE}"
              exit 1
            fi
            HASHES_INPUT="${HASHES_INPUT}${SHA}"$'\n'
          done
          EXTRA="go=${{ env.GO_VERSION }} base=${{ env.BASE_IMAGE }} ldflags=${{ env.LDFLAGS }} sigv=gh-attest-v1"
          HASH=$(printf '%sextra:%s\n' "$HASHES_INPUT" "$EXTRA" | sha256sum | cut -c1-12)
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          END=$(date +%s%N)
          echo "::notice::API hash compute took $(( (END - START) / 1000000 ))ms — hash=${HASH}"

      - uses: alfredtm/yeet-cache-action@v2
        id: cache
        with:
          hash: ${{ steps.hash.outputs.hash }}
          image: ${{ env.IMAGE }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          sign: 'true'
          verify-on-hit: 'false'   # trust-on-first-use; saves ~3-4s on no-op pushes
          tags: crane-${{ steps.vars.outputs.short_sha }},latest

      # ---- CACHE MISS PATH ----

      - uses: actions/checkout@v4
        if: steps.cache.outputs.hit == 'false'
        with:
          fetch-depth: 1
          sparse-checkout: |
            cmd
            internal
            go.mod
            go.sum
          sparse-checkout-cone-mode: false

      - name: "Setup Go"
        if: steps.cache.outputs.hit == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: "Build + pack + push (single round-trip)"
        if: steps.cache.outputs.hit == 'false'
        run: |
          BUILD_START=$(date +%s%N)
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="${{ env.LDFLAGS }}" -trimpath -o app ./cmd/server
          BUILD_END=$(date +%s%N)
          echo "::notice::go build took $(( (BUILD_END - BUILD_START) / 1000000 ))ms"

          PACK_START=$(date +%s%N)
          yeet-pack pack \
            --binary app \
            --binary-path-in-image /app/server \
            --entrypoint /app/server \
            --base "${{ env.BASE_IMAGE }}" \
            --tag "${{ steps.cache.outputs.src-tag }}" \
            --also-tag "crane-${{ steps.vars.outputs.short_sha }},latest"
          PACK_END=$(date +%s%N)
          echo "::notice::yeet-pack pack took $(( (PACK_END - PACK_START) / 1000000 ))ms"
